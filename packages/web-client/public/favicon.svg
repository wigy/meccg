<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d442"/>
      <stop offset="50%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#gold)" stroke-width="5" filter="url(#shadow)"/>
  <!-- Inner ring highlight -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.6"/>
  <!-- Tengwar-inspired decorative marks on the ring -->
  <path d="M 16 24 Q 14 32 16 40" fill="none" stroke="#ffe066" stroke-width="1" opacity="0.5"/>
  <path d="M 48 24 Q 50 32 48 40" fill="none" stroke="#ffe066" stroke-width="1" opacity="0.5"/>
  <path d="M 24 13 Q 32 10 40 13" fill="none" stroke="#ffe066" stroke-width="1" opacity="0.5"/>
  <path d="M 24 51 Q 32 54 40 51" fill="none" stroke="#ffe066" stroke-width="1" opacity="0.5"/>
  <!-- Card silhouette in center -->
  <rect x="25" y="22" width="14" height="20" rx="1.5" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
  <!-- Star on card -->
  <polygon points="32,25 33.5,29 37.5,29 34.5,31.5 35.5,35.5 32,33 28.5,35.5 29.5,31.5 26.5,29 30.5,29" fill="#d4a017" opacity="0.8"/>
</svg>
