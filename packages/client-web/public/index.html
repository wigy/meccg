<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MECCG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="connect-form">
    <input type="text" id="name-input" placeholder="Enter your name" autofocus>
    <select id="deck-select"></select>
    <button id="connect-btn">Connect</button>
  </div>

  <div id="game" class="hidden">
    <div id="toolbar">
      <button id="dice-red-btn" class="hidden dice-test-btn" title="Roll red dice" style="color:#c03030">&#x1F3B2;</button>
      <button id="dice-black-btn" class="hidden dice-test-btn" title="Roll black dice" style="color:#222">&#x1F3B2;</button>
      <button id="save-btn">Save</button>
      <button id="load-btn">Load</button>
      <button id="reset-btn">Reset</button>
      <button id="view-toggle-btn">Visual</button>
      <button id="disconnect-btn">Disconnect</button>
    </div>

    <div id="debug-view">
      <div id="left-panel">
        <h2>Game State</h2>
        <pre id="state"></pre>

        <div id="draft-section">
          <h2>Draft</h2>
          <pre id="draft"></pre>
        </div>

        <div id="log-panel">
          <h2>Log</h2>
          <div id="log"></div>
        </div>
      </div>

      <div id="right-panel">
        <h2>Actions</h2>
        <div id="actions"></div>
      </div>
    </div>

    <div id="visual-view" class="hidden">
      <div id="opponent-name" class="player-label"></div>
      <div id="opponent-arc"></div>
      <div id="visual-board">
        <div id="instruction-text"></div>
        <div id="drafted-opponent" class="drafted-row"></div>
        <div id="drafted-self" class="drafted-row"></div>
      </div>
      <div id="hand-arc"></div>
      <div id="self-name" class="player-label"></div>
    </div>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
