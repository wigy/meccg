<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MECCG</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="connect-form">
    <input type="text" id="name-input" placeholder="Enter your name" autofocus>
    <select id="deck-select"></select>
    <button id="connect-btn">Connect</button>
  </div>

  <div id="game" class="hidden">
    <div id="toolbar">
      <button id="save-btn">Save</button>
      <button id="load-btn">Load</button>
      <button id="reseed-btn">Reseed</button>
      <button id="reset-btn">Reset</button>
      <button id="view-toggle-btn">Visual</button>
      <button id="disconnect-btn" title="Disconnect" style="background:none;border:none;cursor:pointer;padding:4px;vertical-align:middle;"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d32f2f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg></button>
    </div>

    <div id="debug-view">
      <div id="left-panel">
        <h2>Game State</h2>
        <pre id="state"></pre>

        <div id="draft-section">
          <h2>Draft</h2>
          <pre id="draft"></pre>
        </div>

        <div id="log-panel">
          <h2>Log</h2>
          <div id="log"></div>
        </div>
      </div>

      <div id="right-panel">
        <div id="actions"></div>
      </div>
    </div>

    <div id="visual-view" class="hidden">
      <div id="toast-container"></div>
      <div id="opponent-name" class="player-label"></div>
      <div id="opponent-deck-pile"></div>
      <div id="opponent-site-pile"></div>
      <div id="opponent-arc"></div>
      <div id="visual-board">
        <div id="instruction-text"></div>
        <div id="drafted-opponent" class="drafted-row"></div>
        <div id="set-aside"></div>
        <div id="drafted-self" class="drafted-row"></div>
      </div>
      <div id="card-preview"></div>
      <button id="pass-btn" class="hidden"></button>
      <div id="self-deck-pile"></div>
      <div id="self-site-pile"></div>
      <div id="hand-arc"></div>
      <div id="self-name" class="player-label"></div>
    </div>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
