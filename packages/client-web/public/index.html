<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MECCG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="connect-form">
    <input type="text" id="name-input" placeholder="Enter your name" autofocus>
    <select id="deck-select"></select>
    <button id="connect-btn">Connect</button>
  </div>

  <div id="game" class="hidden">
    <div id="toolbar">
      <button id="dice-btn" class="hidden" title="Roll 2d6">&#x1F3B2;</button>
      <button id="save-btn">Save</button>
      <button id="load-btn">Load</button>
      <button id="reset-btn">Reset</button>
      <button id="view-toggle-btn">Visual</button>
      <button id="disconnect-btn">Disconnect</button>
    </div>

    <div id="debug-view">
      <div id="left-panel">
        <h2>Game State</h2>
        <pre id="state"></pre>

        <div id="draft-section">
          <h2>Draft</h2>
          <pre id="draft"></pre>
        </div>

        <div id="log-panel">
          <h2>Log</h2>
          <div id="log"></div>
        </div>
      </div>

      <div id="right-panel">
        <h2>Actions</h2>
        <div id="actions"></div>
      </div>
    </div>

    <div id="visual-view" class="hidden">
      <div id="visual-board">
        <div class="card-art-wrap">
          <div class="card-art-frame">
            <img src="/cards/images/tw/AragornII.jpg" alt="Aragorn II" class="card-art">
          </div>
          <img src="/cards/images/tw/AragornII.jpg" alt="Aragorn II" class="card-full">
        </div>
        <div class="card-art-wrap">
          <div class="card-art-frame">
            <img src="/cards/images/le/TheMouth.jpg" alt="The Mouth" class="card-art">
          </div>
          <img src="/cards/images/le/TheMouth.jpg" alt="The Mouth" class="card-full">
        </div>
        <div class="card-art-wrap">
          <div class="card-art-frame">
            <img src="/cards/images/tw/Cavedrake.jpg" alt="Cave-drake" class="card-art">
          </div>
          <img src="/cards/images/tw/Cavedrake.jpg" alt="Cave-drake" class="card-full">
        </div>
      </div>
    </div>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
